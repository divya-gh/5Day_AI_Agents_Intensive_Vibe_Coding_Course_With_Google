rules:
  - id: detect-hardcoded-google-api-key
    pattern-regex: AIzaSy[A-Za-z0-9_\-]*
    message: "🚨 Security Warning: A hardcoded Google API key or credential prefix has been detected. Please remove it and use environment variables or secret manager instead."
    languages:
      - python
    severity: ERROR
    metadata:
      category: security
